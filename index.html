<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRKZ.ID EXIF ANALYZER PRO</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/piexifjs@1.0.6/piexif.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
    font-family: 'JetBrains Mono', monospace;
    color: #00ffcc;
    min-height: 100vh;
    overflow-x: hidden;
}

.container {
    max-width: 1400px;
    margin: auto;
    padding: 20px;
}

.header {
    text-align: center;
    margin-bottom: 40px;
}

h1 {
    font-family: 'Inter', sans-serif;
    font-size: 3rem;
    font-weight: 800;
    background: linear-gradient(45deg, #00ffcc, #00ccff, #ff00cc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 40px rgba(0, 255, 204, 0.5);
    margin-bottom: 10px;
}

.subtitle {
    color: #00ffcc80;
    font-size: 1.1rem;
    font-weight: 300;
}

.upload-zone {
    border: 2px dashed #00ffcc;
    border-radius: 20px;
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    margin: 40px 0;
    transition: all 0.3s ease;
    position: relative;
    background: rgba(0, 255, 204, 0.03);
    backdrop-filter: blur(10px);
}

.upload-zone:hover {
    border-color: #00ccff;
    background: rgba(0, 255, 204, 0.08);
    box-shadow: 0 0 50px rgba(0, 255, 204, 0.3);
    transform: translateY(-5px);
}

.upload-zone.dragover {
    border-color: #ff00cc;
    background: rgba(255, 0, 204, 0.15);
    box-shadow: 0 0 60px rgba(255, 0, 204, 0.4);
}

.upload-text {
    font-size: 1.4rem;
    margin-bottom: 20px;
    font-weight: 500;
}

.upload-icon {
    font-size: 4rem;
    margin-bottom: 20px;
    display: block;
}

.preview-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    margin-bottom: 40px;
}

@media (max-width: 768px) {
    .preview-container {
        grid-template-columns: 1fr;
    }
}

.preview {
    background: rgba(0, 255, 204, 0.05);
    border-radius: 15px;
    padding: 20px;
    border: 1px solid #00ffcc20;
}

.preview img {
    width: 100%;
    max-height: 500px;
    object-fit: contain;
    border-radius: 10px;
    border: 1px solid #00ffcc40;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
}

.file-info {
    display: flex;
    flex-direction: column;
    gap: 15px;
    font-size: 0.95rem;
}

.info-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #00ffcc10;
}

.info-label {
    color: #00ffaa;
    font-weight: 500;
}

.info-value {
    color: #ffffff;
}

.controls {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 30px;
}

.btn {
    background: transparent;
    border: 1px solid #00ffcc;
    color: #00ffcc;
    padding: 12px 24px;
    border-radius: 25px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.btn:hover {
    background: rgba(0, 255, 204, 0.1);
    box-shadow: 0 0 25px rgba(0, 255, 204, 0.4);
    transform: translateY(-2px);
}

.btn:active {
    transform: translateY(0);
}

.btn-secondary {
    border-color: #00ccff;
    color: #00ccff;
}

.btn-danger {
    border-color: #ff4444;
    color: #ff4444;
}

.btn-success {
    border-color: #44ff44;
    color: #44ff44;
}

.content {
    display: grid;
    grid-template-columns: 1fr 350px;
    gap: 30px;
    margin-bottom: 40px;
}

@media (max-width: 1200px) {
    .content {
        grid-template-columns: 1fr;
    }
}

.metadata-table {
    background: rgba(0, 255, 204, 0.03);
    border-radius: 15px;
    padding: 25px;
    border: 1px solid #00ffcc20;
    backdrop-filter: blur(20px);
    max-height: 600px;
    overflow-y: auto;
}

.table {
    width: 100%;
    border-collapse: collapse;
}

.table-row {
    border-bottom: 1px solid #00ffcc15;
    transition: all 0.2s ease;
}

.table-row:hover {
    background: rgba(0, 255, 204, 0.08);
}

.table-cell {
    padding: 15px 12px;
    vertical-align: top;
}

.table-label {
    color: #00ffaa;
    font-weight: 600;
    font-size: 0.9rem;
    min-width: 120px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.table-value {
    color: #ffffff;
    font-size: 0.95rem;
    word-break: break-word;
}

.gps-container {
    background: linear-gradient(135deg, rgba(0, 204, 255, 0.2), rgba(0, 255, 204, 0.2));
    border-radius: 12px;
    padding: 20px;
    margin: 15px 0;
    border: 1px solid rgba(0, 204, 255, 0.3);
}

.gps-coords {
    font-size: 1.4rem;
    font-weight: 700;
    color: #00ccff;
    margin-bottom: 15px;
    text-align: center;
    letter-spacing: 1px;
}

.map-buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
}

.raw-exif {
    background: rgba(255, 68, 68, 0.1);
    border: 1px solid rgba(255, 68, 68, 0.3);
    border-radius: 12px;
    padding: 20px;
    margin-top: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    max-height: 300px;
    overflow-y: auto;
    white-space: pre-wrap;
    color: #ffaaaa;
}

.raw-exif.hidden {
    display: none;
}

.sidebar {
    background: rgba(0, 255, 204, 0.05);
    border-radius: 15px;
    padding: 25px;
    border: 1px solid #00ffcc20;
    height: fit-content;
}

.action-buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 25px;
}

.toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: rgba(0, 255, 204, 0.95);
    color: #000;
    padding: 15px 25px;
    border-radius: 25px;
    font-weight: 600;
    box-shadow: 0 10px 40px rgba(0, 255, 204, 0.4);
    transform: translateX(400px);
    transition: transform 0.3s ease;
    z-index: 1000;
    backdrop-filter: blur(20px);
}

.toast.show {
    transform: translateX(0);
}

::-webkit-scrollbar {
    width: 8px;
}

::-webkit-scrollbar-track {
    background: rgba(0, 255, 204, 0.1);
    border-radius: 4px;
}

::-webkit-scrollbar-thumb {
    background: rgba(0, 255, 204, 0.4);
    border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
    background: rgba(0, 255, 204, 0.6);
}
</style>
</head>

<body>
<div class="container">
    <div class="header">
        <h1>MRKZ.ID EXIF ANALYZER</h1>
        <div class="subtitle">Professional Metadata Extraction & GPS Intelligence</div>
    </div>

    <div class="upload-zone" id="uploadBox">
        <div class="upload-icon">📁</div>
        <div class="upload-text">Click or Drag & Drop Your Image Here</div>
        <div style="color: #00ffcc80; font-size: 0.95rem;">Supports JPEG with EXIF data</div>
        <input type="file" id="fileInput" accept="image/jpeg,image/jpg" hidden>
    </div>

    <div class="preview-container" id="previewContainer" style="display: none;">
        <div class="preview">
            <img id="imgPreview">
        </div>
        <div class="file-info">
            <div class="info-row">
                <span class="info-label">Filename</span>
                <span class="info-value" id="fileName">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Size</span>
                <span class="info-value" id="fileSize">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Dimensions</span>
                <span class="info-value" id="dimensions">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">File Type</span>
                <span class="info-value" id="fileType">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Modified</span>
                <span class="info-value" id="modifiedDate">-</span>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="toggleRawExif()">🔧 RAW EXIF</button>
        <button class="btn btn-secondary" onclick="clearAll()">🗑️ CLEAR ALL</button>
        <button class="btn btn-success" onclick="exportData()">💾 EXPORT JSON</button>
    </div>

    <div class="content">
        <div class="metadata-table">
            <table class="table" id="metadataTable">
                <tbody id="tableBody"></tbody>
            </table>
            <div class="raw-exif hidden" id="rawExif">
                <strong>RAW EXIF JSON:</strong>
                <pre id="rawExifContent"></pre>
            </div>
        </div>
        
        <div class="sidebar" id="sidebar" style="display: none;">
            <h3 style="margin-bottom: 20px; color: #00ffcc;">Quick Actions</h3>
            <div class="action-buttons">
                <button class="btn" onclick="copyAllCoords()">📋 Copy All GPS</button>
                <button class="btn btn-secondary" onclick="openAllMaps()">🗺️ Open All Maps</button>
                <button class="btn btn-success" onclick="downloadCleanImage()">🧹 Clean EXIF</button>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentExif = null;
let currentFile = null;
let currentImageData = null;

const uploadBox = document.getElementById('uploadBox');
const fileInput = document.getElementById('fileInput');
const previewContainer = document.getElementById('previewContainer');
const tableBody = document.getElementById('tableBody');
const sidebar = document.getElementById('sidebar');
const rawExif = document.getElementById('rawExif');
const toast = document.getElementById('toast');

const EXIF_TAGS = {
    // 0th IFD
    '256': 'ImageWidth',
    '257': 'ImageLength',
    '271': 'Make',
    '272': 'Model',
    '305': 'Software',
    '306': 'DateTime',
    '282': 'XResolution',
    '283': 'YResolution',
    '296': 'ResolutionUnit',

    // Exif IFD
    '36864': 'ExifVersion',
    '36867': 'DateTimeOriginal',
    '36868': 'DateTimeDigitized',
    '33434': 'ExposureTime',
    '33437': 'FNumber',
    '34855': 'ISOSpeedRatings',
    '37377': 'ShutterSpeedValue',
    '37378': 'ApertureValue',
    '37386': 'FocalLength',
    '41986': 'ExposureMode',
    '41987': 'WhiteBalance',
    '41990': 'SceneCaptureType',
    '41992': 'Contrast',
    '41993': 'Saturation',
    '41994': 'Sharpness',
    '41996': 'SubjectDistanceRange',

    // GPS IFD
    'GPSVersionID': 'GPSVersionID',
    'GPSLatitudeRef': 'GPSLatitudeRef',
    'GPSLatitude': 'GPSLatitude',
    'GPSLongitudeRef': 'GPSLongitudeRef',
    'GPSLongitude': 'GPSLongitude',
    'GPSAltitudeRef': 'GPSAltitudeRef',
    'GPSAltitude': 'GPSAltitude',
    'GPSTimeStamp': 'GPSTimeStamp',
    'GPSSatellites': 'GPSSatellites',
    'GPSImgDirection': 'GPSImgDirection',
    'GPSDateStamp': 'GPSDateStamp',
    'GPSProcessingMethod': 'GPSProcessingMethod',
    'GPSAreaInformation': 'GPSAreaInformation'
};

uploadBox.addEventListener('click', () => fileInput.click());
uploadBox.addEventListener('dragover', handleDragOver);
uploadBox.addEventListener('dragleave', handleDragLeave);
uploadBox.addEventListener('drop', handleDrop);

function handleDragOver(e) {
    e.preventDefault();
    e.stopPropagation();
    uploadBox.classList.add('dragover');
}

function handleDragLeave(e) {
    e.preventDefault();
    e.stopPropagation();
    uploadBox.classList.remove('dragover');
}

function handleDrop(e) {
    e.preventDefault();
    e.stopPropagation();
    uploadBox.classList.remove('dragover');
    
    const files = e.dataTransfer.files;
    if (files.length > 0) {
        fileInput.files = files;
        handleFile(files[0]);
    }
}

fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) {
        handleFile(e.target.files[0]);
    }
});

async function handleFile(file) {
    currentFile = file;
    showToast('Processing image...');

    const reader = new FileReader();
    reader.onload = async function(ev) {
        currentImageData = ev.target.result;
        await loadImagePreview(ev.target.result);
        await extractExif(ev.target.result);
    };
    reader.readAsDataURL(file);
}

async function loadImagePreview(dataUrl) {
    const img = document.getElementById('imgPreview');
    img.src = dataUrl;
    
    previewContainer.style.display = 'grid';
    
    // File info
    document.getElementById('fileName').textContent = currentFile.name;
    document.getElementById('fileSize').textContent = formatFileSize(currentFile.size);
    document.getElementById('fileType').textContent = currentFile.type || 'JPEG';
    document.getElementById('modifiedDate').textContent = new Date(currentFile.lastModified).toLocaleString();
    
    // Image dimensions
    const imgPreview = document.getElementById('imgPreview');
    imgPreview.onload = () => {
        document.getElementById('dimensions').textContent = `${imgPreview.naturalWidth} × ${imgPreview.naturalHeight}px`;
    };
}

async function extractExif(dataUrl) {
    try {
        const exifObj = piexif.load(dataUrl);
        currentExif = exifObj;
        renderMetadata(exifObj);
        sidebar.style.display = 'block';
        showToast('EXIF data loaded successfully!');
    } catch (error) {
        tableBody.innerHTML = '<tr><td colspan="2" style="text-align:center;padding:40px;color:#ff8888;">❌ No EXIF data found in this image</td></tr>';
        showToast('No EXIF data found');
    }
}

function renderMetadata(exif) {
    let html = '';
    
    // File info first
    html += createRow('📁', 'Filename', currentFile.name);
    html += createRow('⚖️', 'File Size', formatFileSize(currentFile.size));
    
    // Image properties
    if (exif["0th"] && exif["0th"][256] && exif["0th"][257]) {
        html += createRow('📐', 'Dimensions', `${exif["0th"][256]} × ${exif["0th"][257]}px`);
    }
    
    // GPS Data - Priority
    if (exif.GPS && exif.GPS[2] && exif.GPS[4]) {
        const gpsData = parseGPS(exif.GPS);
        html += renderGPSSection(gpsData);
    }
    
    // Date/Time data
    const dates = extractDates(exif);
    dates.forEach(date => {
        html += createRow('📅', date.label, date.value);
    });
    
    // Camera info
    const cameraInfo = extractCameraInfo(exif);
    cameraInfo.forEach(info => {
        html += createRow(info.icon, info.label, info.value);
    });
    
    // Exposure info
    const exposureInfo = extractExposureInfo(exif);
    exposureInfo.forEach(info => {
        html += createRow(info.icon, info.label, info.value);
    });
    
    // Other metadata
    const otherInfo = extractOtherInfo(exif);
    otherInfo.forEach(info => {
        html += createRow(info.icon, info.label, info.value);
    });
    
    tableBody.innerHTML = html;
}

function renderGPSSection(gps) {
    let html = `
    <tr class="gps-container">
        <td class="table-cell table-label">📍 GPS LOCATION</td>
        <td class="table-cell">
            <div class="gps-coords">${gps.lat} ${gps.latRef}, ${gps.lng} ${gps.lngRef}</div>
            <div class="map-buttons">
                <a href="${gps.googleMaps}" target="_blank" class="btn btn-secondary" style="padding:8px 16px;font-size:0.85rem;">🗺️ Street</a>
                <a href="${gps.googleSatellite}" target="_blank" class="btn" style="padding:8px 16px;font-size:0.85rem;">🛰️ Satellite</a>
                <a href="${gps.openstreetmap}" target="_blank" class="btn btn-secondary" style="padding:8px 16px;font-size:0.85rem;">🗺️ OpenStreet</a>
                <button class="btn" onclick="copyGPS('${gps.formatted}')" style="padding:8px 16px;font-size:0.85rem;">📋 Copy</button>
            </div>
            ${gps.altitude ? `<div style="margin-top:10px;font-size:0.9rem;color:#00ffaa;">📏 Altitude: ${gps.altitude}m</div>` : ''}
            ${gps.timestamp ? `<div style="margin-top:5px;font-size:0.9rem;color:#00ffaa;">⏰ GPS Time: ${gps.timestamp}</div>` : ''}
        </td>
    </tr>`;
    return html;
}

function parseGPS(gps) {
    const lat = convertDMSToDD(gps[2], gps[1]);
    const lng = convertDMSToDD(gps[4], gps[3]);
    
    const latRef = gps[1] === 'N' ? '' : 'S';
    const lngRef = gps[3] === 'E' ? '' : 'W';
    
    const formatted = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
    
    return {
        lat: lat.toFixed(8),
        lng: lng.toFixed(8),
        latRef,
        lngRef,
        formatted,
        altitude: gps[6] ? (gps[6][0]/gps[6][1]).toFixed(1) : null,
        timestamp: gps[7] ? formatGPSTime(gps[7]) : null,
        googleMaps: `https://www.google.com/maps?q=${lat},${lng}`,
        googleSatellite: `https://www.google.com/maps/@${lat},${lng},18z/data=!3m1!1e3`,
        openstreetmap: `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lng}#map=18/${lat}/${lng}`
    };
}

function convertDMSToDD(dms, ref) {
    let dd = dms[0][0] / dms[0][1] + 
             (dms[1][0] / dms[1][1]) / 60 + 
             (dms[2][0] / dms[2][1]) / 3600;
    return ref === 'S' || ref === 'W' ? -dd : dd;
}

function formatGPSTime(timestamp) {
    const [h, m, s] = timestamp;
    return `${h[0]/h[1]}:${m[0]/m[1]}:${s[0]/s[1]}`;
}

function extractDates(exif) {
    const dates = [];
    
    if (exif.Exif && exif.Exif[36867]) {
        dates.push({ label: 'Date Taken', value: formatEXIFDate(exif.Exif[36867]) });
    }
    if (exif.Exif && exif.Exif[36868]) {
        dates.push({ label: 'Date Digitized', value: formatEXIFDate(exif.Exif[36868]) });
    }
    if (exif["0th"] && exif["0th"][306]) {
        dates.push({ label: 'File Modified', value: formatEXIFDate(exif["0th"][306]) });
    }
    
    return dates;
}

function extractCameraInfo(exif) {
    const info = [];
    
    if (exif["0th"] && exif["0th"][271]) info.push({ icon: '🏭', label: 'Manufacturer', value: exif["0th"][271] });
    if (exif["0th"] && exif["0th"][272]) info.push({ icon: '📷', label: 'Camera Model', value: exif["0th"][272] });
    if (exif["0th"] && exif["0th"][305]) info.push({ icon: '⚙️', label: 'Software', value: exif["0th"][305] });
    if (exif.Exif && exif.Exif[36864]) info.push({ icon: '📋', label: 'EXIF Version', value: exif.Exif[36864] });
    
    return info;
}

function extractExposureInfo(exif) {
    const info = [];
    
    if (exif.Exif && exif.Exif[33434]) info.push({ icon: '⏱️', label: 'Exposure Time', value: formatFraction(exif.Exif[33434]) });
    if (exif.Exif && exif.Exif[33437]) info.push({ icon: '🔺', label: 'F-Number', value: `f/${formatFraction(exif.Exif[33437])}` });
    if (exif.Exif && exif.Exif[34855]) info.push({ icon: '🎚️', label: 'ISO', value: exif.Exif[34855] });
    if (exif.Exif && exif.Exif[37386]) info.push({ icon: '🔍', label: 'Focal Length', value: `${formatFraction(exif.Exif[37386])}mm` });
    
    return info;
}

function extractOtherInfo(exif) {
    const info = [];
    
    if (exif.Exif && exif.Exif[41986]) info.push({ icon: '🎨', label: 'Exposure Mode', value: ['Auto', 'Manual', 'Bracket'][exif.Exif[41986]] || exif.Exif[41986] });
    if (exif.Exif && exif.Exif[41987]) info.push({ icon: '☀️', label: 'White Balance', value: ['Auto', 'Daylight', 'Cloudy'][exif.Exif[41987]] || exif.Exif[41987] });
    if (exif.GPS && exif.GPS[7]) info.push({ icon: '🛰️', label: 'Satellites', value: exif.GPS[7] });
    
    return info;
}

function createRow(icon, label, value) {
    return `
    <tr class="table-row">
        <td class="table-cell table-label">${icon} ${label}</td>
        <td class="table-cell table-value">${value || '-'}</td>
    </tr>`;
}

function formatEXIFDate(dateStr) {
    try {
        const date = new Date(dateStr.replace(/:/g, '-'));
        return date.toLocaleString();
    } catch {
        return dateStr;
    }
}

function formatFraction(fraction) {
    if (!fraction || !fraction[0] || !fraction[1]) return 'N/A';
    return (fraction[0] / fraction[1]).toFixed(2);
}

function formatFileSize(bytes) {
    if (bytes === 0) return '0 Bytes';
    const k = 1024;
    const sizes = ['Bytes', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

function copyGPS(text) {
    navigator.clipboard.writeText(text);
    showToast(`Copied GPS: ${text}`);
}

function copyAllCoords() {
    if (currentExif?.GPS) {
        const gps = parseGPS(currentExif.GPS);
        navigator.clipboard.writeText(gps.formatted);
        showToast('All GPS coordinates copied!');
    }
}

function openAllMaps() {
    if (currentExif?.GPS) {
        const gps = parseGPS(currentExif.GPS);
        window.open(gps.googleMaps, '_blank');
        window.open(gps.googleSatellite, '_blank');
        showToast('Maps opened!');
    }
}

function toggleRawExif() {
    const isHidden = rawExif.classList.contains('hidden');
    rawExif.classList.toggle('hidden');
    
    if (isHidden && currentExif) {
        document.getElementById('rawExifContent').textContent = JSON.stringify(currentExif, null, 2);
    }
    
    showToast(isHidden ? 'RAW EXIF shown' : 'RAW EXIF hidden');
}

function clearAll() {
    fileInput.value = '';
    previewContainer.style.display = 'none';
    sidebar.style.display = 'none';
    tableBody.innerHTML = '';
    rawExif.classList.add('hidden');
    currentExif = null;
    currentFile = null;
    showToast('Cleared all data');
}

function exportData() {
    if (currentExif) {
        const data = {
            file: currentFile.name,
            exif: currentExif,
            timestamp: new Date().toISOString()
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `exif-${currentFile.name.replace(/\.[^/.]+$/, '')}.json`;
        a.click();
        showToast('EXIF data exported!');
    }
}

async function downloadCleanImage() {
    if (!currentImageData) return;
    
    try {
        const zeroExif = piexif.remove(currentImageData);
        const blob = base64ToBlob(zeroExif);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `clean-${currentFile.name}`;
        a.click();
        showToast('Clean image (no EXIF) downloaded!');
    } catch (e) {
        showToast('Error creating clean image');
    }
}

function base64ToBlob(base64) {
    const byteCharacters = atob(base64.split(',')[1]);
    const byteNumbers = new Array(byteCharacters.length);
    for (let i = 0; i < byteCharacters.length; i++) {
        byteNumbers[i] = byteCharacters.charCodeAt(i);
    }
    return new Blob([new Uint8Array(byteNumbers)], {type: 'image/jpeg'});
}

function showToast(message) {
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => {
        toast.classList.remove('show');
    }, 3000);
}
</script>
